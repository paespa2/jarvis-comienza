name: Jarvis Daily Self-Improvement

on:
  schedule:
    # Run every day at 6 AM UTC (2 AM EST)
    - cron: '0 6 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  self-improve:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current time
        id: time
        run: echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Trigger Jarvis Self-Improvement
        id: improve
        run: |
          echo "🚀 Starting Jarvis self-improvement analysis..."
          echo "📊 Timestamp: ${{ steps.time.outputs.timestamp }}"

          # Call the self-improve endpoint on production Railway instance
          # Using curl with timeout (30 seconds max)
          RESPONSE=$(curl -s -X POST \
            "${JARVIS_API_URL}/api/self-improve" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${JARVIS_TOKEN}" \
            -d '{"days": 1}' \
            --max-time 30 \
            --connect-timeout 10)

          echo "Response: $RESPONSE"
          echo "$RESPONSE" > improvement_result.json

          # Extract key metrics
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
          COMMIT_HASH=$(echo "$RESPONSE" | jq -r '.commitHash // "unknown"')
          IMPROVEMENTS=$(echo "$RESPONSE" | jq -r '.improvements // 0')

          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "improvements_count=$IMPROVEMENTS" >> $GITHUB_OUTPUT

          if [ "$SUCCESS" = "true" ]; then
            echo "✅ Self-improvement completed successfully"
            echo "📝 Committed: $COMMIT_HASH"
            echo "🎯 Changes applied: $IMPROVEMENTS"
          else
            echo "⚠️ Self-improvement completed with warnings"
            echo "Response: $RESPONSE"
          fi
        env:
          JARVIS_API_URL: ${{ secrets.JARVIS_API_URL }}
          JARVIS_TOKEN: ${{ secrets.JARVIS_TOKEN }}
        continue-on-error: true

      - name: Log improvement metrics
        run: |
          echo "## 🤖 Jarvis Daily Improvement Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ steps.time.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.improve.outputs.success }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ steps.improve.outputs.commit_hash }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Changes Applied:** ${{ steps.improve.outputs.improvements_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Results](../../runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Save improvement results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: improvement-results-${{ steps.time.outputs.timestamp }}
          path: improvement_result.json
          retention-days: 30

  # Fallback: If workflow fails, log it
  on-failure:
    runs-on: ubuntu-latest
    needs: self-improve
    if: failure()

    steps:
      - name: Log failure
        run: |
          echo "⚠️ Self-improvement workflow failed"
          echo "This may indicate:"
          echo "- Jarvis API unreachable"
          echo "- Missing JARVIS_API_URL or JARVIS_TOKEN secrets"
          echo "- Timeout (>30 seconds)"
          echo ""
          echo "Next attempt: Tomorrow at 6 AM UTC"
