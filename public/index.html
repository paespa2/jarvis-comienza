<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS IA - Agentic System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #0f1419;
            --bg-tertiary: #14192e;
            --text-primary: #e0e0e0;
            --text-secondary: #9a9a9a;
            --accent-primary: #00d4ff;
            --accent-secondary: #10b981;
            --accent-danger: #ef4444;
            --border-color: #1e2841;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', 'Roboto Mono', monospace;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            overflow-y: auto;
            box-shadow: inset 8px 0 16px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-family: 'Roboto Mono', monospace;
            font-size: 14px;
            color: var(--accent-primary);
            margin-bottom: 32px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.95;
        }

        .system-status {
            background-color: rgba(10, 14, 39, 0.6);
            border: 1px solid var(--border-color);
            padding: 12px;
            margin-bottom: 20px;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-secondary);
            border-radius: 4px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            align-items: center;
        }

        .status-label {
            color: var(--accent-primary);
            font-weight: 600;
            font-size: 11px;
        }

        .status-value {
            color: var(--text-primary);
            font-family: 'Roboto Mono';
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-secondary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px 12px;
            background-color: transparent;
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .new-chat-btn:hover {
            background-color: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-primary);
        }

        /* HEADER */
        .header {
            background: linear-gradient(90deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .header-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-badge {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-secondary);
        }

        /* CHAT AREA */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-icon {
            font-size: 14px;
            min-width: 20px;
            text-align: center;
        }

        .message-content {
            flex: 1;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-family: 'Roboto Mono';
        }

        .message-text {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-primary);
            word-wrap: break-word;
        }

        .message.user .message-text {
            color: var(--accent-primary);
        }

        .message.system .message-text {
            color: var(--accent-secondary);
        }

        .message.error .message-text {
            color: var(--accent-danger);
        }

        .message.loading .message-text {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* INPUT AREA */
        .input-container {
            border-top: 1px solid var(--border-color);
            padding: 16px 24px;
            background-color: var(--bg-secondary);
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background-color: rgba(10, 14, 39, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0 12px;
            transition: border-color 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
        }

        #query-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: 'Roboto Mono', monospace;
            font-size: 13px;
            padding: 10px 0;
            outline: none;
        }

        #query-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            padding: 10px 14px;
            background-color: transparent;
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .send-btn:hover:not(:disabled) {
            background-color: rgba(0, 212, 255, 0.15);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .header {
                padding: 12px 16px;
            }

            .messages {
                padding: 16px;
            }

            .input-container {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="logo">◆ JARVIS IA</div>

            <div class="system-status">
                <div class="status-item">
                    <span class="status-label">STATUS</span>
                    <div style="display: flex; align-items: center; gap: 4px;">
                        <div class="status-indicator"></div>
                        <span class="status-value">OPERATIONAL</span>
                    </div>
                </div>
                <div class="status-item">
                    <span class="status-label">VERSION</span>
                    <span class="status-value">2.0.0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">MODE</span>
                    <span class="status-value">AGENTIC</span>
                </div>
                <div class="status-item">
                    <span class="status-label">PHASE</span>
                    <span class="status-value">2</span>
                </div>
            </div>

            <button class="new-chat-btn">+ New Session</button>

            <div style="flex: 1; overflow-y: auto;">
                <div style="font-size: 11px; color: var(--text-secondary); padding: 8px 0;">
                    <p style="margin-bottom: 12px;">Recent Operations:</p>
                    <div id="recent-ops" style="max-height: 200px; overflow-y: auto;">
                        <p style="font-style: italic; opacity: 0.7;">None yet</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- HEADER -->
            <div class="header">
                <div class="header-title">Jarvis Agentic System</div>
                <div class="header-status">
                    <div class="status-badge"></div>
                    <span>Online</span>
                </div>
            </div>

            <!-- CHAT CONTAINER -->
            <div class="chat-container">
                <div class="messages" id="messages">
                    <div class="message system">
                        <div class="message-icon">◆</div>
                        <div class="message-content">
                            <div class="message-time" id="init-time"></div>
                            <div class="message-text">
                                JARVIS AGENTIC SYSTEM INITIALIZED<br>
                                Constitutional AI: ACTIVE<br>
                                Agentic Loop: READY<br>
                                Memory Systems: CONSOLIDATED
                            </div>
                        </div>
                    </div>
                </div>

                <!-- INPUT -->
                <div class="input-container">
                    <div class="input-wrapper">
                        <input
                            id="query-input"
                            type="text"
                            placeholder="Send command..."
                            autocomplete="off"
                        >
                    </div>
                    <button id="send-btn" class="send-btn">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const queryInput = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const recentOpsContainer = document.getElementById('recent-ops');

        // Initialize time
        document.getElementById('init-time').textContent = new Date().toLocaleTimeString('es-MX', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });

        function addMessage(text, type = 'system', showTime = true) {
            const message = document.createElement('div');
            message.className = `message ${type}`;

            const timeStr = new Date().toLocaleTimeString('es-MX', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            const icon = type === 'user' ? '▸' : type === 'error' ? '✗' : type === 'loading' ? '⟳' : '◆';

            message.innerHTML = `
                <div class="message-icon">${icon}</div>
                <div class="message-content">
                    ${showTime ? `<div class="message-time">${timeStr}</div>` : ''}
                    <div class="message-text">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
                </div>
            `;

            messagesContainer.appendChild(message);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            return message;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const query = queryInput.value.trim();
            if (!query) return;

            // Add user message
            addMessage(query, 'user');
            queryInput.value = '';
            sendBtn.disabled = true;

            try {
                // Create task
                const createResponse = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, priority: 'medium' })
                });

                const createData = await createResponse.json();
                if (!createData.success) {
                    addMessage(`ERROR: ${createData.error}`, 'error');
                    sendBtn.disabled = false;
                    return;
                }

                const taskId = createData.data.id;
                const loadingMsg = addMessage('Processing...', 'loading');

                // Poll for result
                let attempts = 0;
                const maxAttempts = 60; // 60 seconds max

                const pollResult = async () => {
                    const getResponse = await fetch(`/api/tasks/${taskId}`);
                    const getData = await getResponse.json();

                    if (!getData.success) {
                        loadingMsg.remove();
                        addMessage(`ERROR: Task not found`, 'error');
                        sendBtn.disabled = false;
                        return;
                    }

                    const task = getData.data;

                    if (task.status === 'completed') {
                        loadingMsg.remove();
                        const result = task.result;

                        if (result.success) {
                            addMessage(`✓ Task completed (${result.iterations} iterations, ${result.executionTime}ms)\n\n${result.output}\n\nConstitutional Validation: ${result.constitutionalValidation.approved ? 'APPROVED' : 'REJECTED'}`, 'system');

                            // Update recent ops
                            const op = document.createElement('div');
                            op.style.padding = '4px 0';
                            op.style.borderBottom = '1px solid rgba(0, 212, 255, 0.1)';
                            op.style.fontSize = '10px';
                            op.innerHTML = `✓ ${query.substring(0, 30)}...`;
                            recentOpsContainer.insertBefore(op, recentOpsContainer.firstChild);
                            if (recentOpsContainer.children.length > 5) {
                                recentOpsContainer.removeChild(recentOpsContainer.lastChild);
                            }
                        } else {
                            addMessage(`✗ Task failed: ${result.output}`, 'error');
                        }
                        sendBtn.disabled = false;
                    } else if (task.status === 'failed') {
                        loadingMsg.remove();
                        addMessage(`ERROR: ${task.error || 'Task failed'}`, 'error');
                        sendBtn.disabled = false;
                    } else {
                        attempts++;
                        if (attempts < maxAttempts) {
                            setTimeout(pollResult, 1000);
                        } else {
                            loadingMsg.remove();
                            addMessage('ERROR: TIMEOUT - PROCESSING EXCEEDED', 'error');
                            sendBtn.disabled = false;
                        }
                    }
                };

                pollResult();

            } catch (error) {
                addMessage(`ERROR: ${error.message}`, 'error');
                sendBtn.disabled = false;
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendMessage();
            }
        });
        queryInput.focus();
    </script>
</body>
</html>
