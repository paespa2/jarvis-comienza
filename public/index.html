<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS IA - PROFESSIONAL MILITARY INTERFACE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #2c3e50;
            --color-secondary: #34495e;
            --color-accent: #3498db;
            --color-success: #27ae60;
            --color-warning: #e74c3c;
            --color-text: #ecf0f1;
            --color-text-secondary: #bdc3c7;
            --color-bg-dark: #1a1f2e;
            --color-bg-darker: #0f1219;
            --color-border: #2c3e50;
            --color-border-light: #34495e;
        }

        body {
            font-family: 'Inter', 'Roboto Mono', monospace;
            background-color: var(--color-bg-dark);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* SIDEBAR */
        .sidebar {
            width: 300px;
            background-color: var(--color-bg-darker);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .logo {
            font-family: 'Roboto Mono', monospace;
            font-size: 1.1em;
            color: var(--color-accent);
            margin-bottom: 25px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .system-info {
            background-color: var(--color-bg-dark);
            border: 1px solid var(--color-border);
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.75em;
            line-height: 1.8;
            color: var(--color-text-secondary);
        }

        .system-info div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .system-info-label {
            color: var(--color-accent);
            font-weight: 600;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--color-accent);
            color: var(--color-bg-darker);
            border: 1px solid var(--color-accent);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.75em;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .new-chat-btn:hover {
            background-color: #2980b9;
            border-color: #2980b9;
        }

        .new-chat-btn:active {
            transform: scale(0.98);
        }

        .conversation-history {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--color-border);
            padding: 10px;
            background-color: var(--color-bg-dark);
        }

        .conversation-item {
            padding: 10px;
            margin-bottom: 6px;
            background-color: var(--color-bg-darker);
            border: 1px solid var(--color-border);
            cursor: pointer;
            font-size: 0.7em;
            color: var(--color-text-secondary);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .conversation-item:hover {
            background-color: var(--color-bg-dark);
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        /* MAIN CHAT */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--color-bg-dark);
        }

        .chat-header {
            background-color: var(--color-bg-darker);
            border-bottom: 1px solid var(--color-border);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-title {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9em;
            color: var(--color-accent);
            letter-spacing: 1px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .chat-header-status {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 0.65em;
            color: var(--color-text-secondary);
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--color-success);
            flex-shrink: 0;
        }

        /* MESSAGES */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            flex-shrink: 0;
            font-family: 'Roboto Mono', monospace;
            background-color: var(--color-bg-darker);
            font-weight: 600;
        }

        .message-avatar.jarvis {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .message-avatar.user {
            border-color: var(--color-success);
            color: var(--color-success);
        }

        .message-content {
            max-width: 60%;
            flex: 1;
        }

        .message-bubble {
            padding: 12px;
            border: 1px solid;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 0.8em;
            font-family: 'Roboto Mono', monospace;
        }

        .message.user .message-bubble {
            border-color: var(--color-success);
            background-color: rgba(39, 174, 96, 0.08);
            color: var(--color-text);
            border-left: 3px solid var(--color-success);
        }

        .message.jarvis .message-bubble {
            border-color: var(--color-accent);
            background-color: rgba(52, 152, 219, 0.08);
            color: var(--color-text);
            border-left: 3px solid var(--color-accent);
        }

        .message-time {
            font-size: 0.65em;
            color: var(--color-text-secondary);
            margin-top: 4px;
            font-family: 'Roboto Mono', monospace;
        }

        /* AGENTIC VIZ */
        .agentic-viz {
            background-color: rgba(52, 152, 219, 0.08);
            border: 1px solid var(--color-accent);
            padding: 10px;
            margin-top: 8px;
            font-size: 0.7em;
            color: var(--color-text-secondary);
            font-family: 'Roboto Mono', monospace;
            line-height: 1.6;
        }

        .phase-bar {
            display: flex;
            gap: 2px;
            margin: 6px 0;
            height: 4px;
        }

        .phase {
            flex: 1;
            background-color: var(--color-border);
            border: none;
        }

        .phase.active {
            background-color: var(--color-accent);
        }

        .phase.completed {
            background-color: var(--color-success);
        }

        .constitution-status {
            margin-top: 6px;
            padding: 6px;
            border: 1px solid var(--color-accent);
            color: var(--color-accent);
            text-align: center;
            font-weight: 600;
            font-size: 0.75em;
        }

        /* INPUT AREA */
        .input-area {
            background-color: var(--color-bg-darker);
            border-top: 1px solid var(--color-border);
            padding: 15px;
            display: flex;
            gap: 8px;
        }

        .input-form {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .input-field {
            flex: 1;
            background-color: var(--color-bg-dark);
            border: 1px solid var(--color-border);
            color: var(--color-text);
            padding: 10px 12px;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.8em;
            resize: none;
            max-height: 100px;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--color-accent);
            background-color: var(--color-bg-dark);
        }

        .input-field::placeholder {
            color: var(--color-text-secondary);
        }

        .send-btn {
            background-color: var(--color-accent);
            color: var(--color-bg-darker);
            border: 1px solid var(--color-accent);
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            transition: all 0.2s ease;
            font-family: 'Roboto Mono', monospace;
            flex-shrink: 0;
            font-weight: 600;
        }

        .send-btn:hover:not(:disabled) {
            background-color: #2980b9;
            border-color: #2980b9;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex-direction: column;
            color: var(--color-text-secondary);
            text-align: center;
            font-family: 'Roboto Mono', monospace;
        }

        .empty-state-title {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: var(--color-accent);
            letter-spacing: 1px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .empty-state p {
            color: var(--color-text-secondary);
            font-size: 0.8em;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background-color: var(--color-bg-dark);
            border: 1px solid var(--color-border);
        }

        ::-webkit-scrollbar-thumb {
            background-color: var(--color-border);
            border: 1px solid var(--color-border-light);
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: var(--color-accent);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar { width: 0; position: absolute; z-index: 100; height: 100%; }
            .message-content { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="logo">◆ JARVIS IA</div>

            <div class="system-info">
                <div><span class="system-info-label">STATUS</span> ONLINE</div>
                <div><span class="system-info-label">CPU</span> 45%</div>
                <div><span class="system-info-label">RAM</span> 512MB</div>
                <div><span class="system-info-label">NETWORK</span> ACTIVE</div>
            </div>

            <button class="new-chat-btn" onclick="newChat()">+ NEW SESSION</button>

            <div class="conversation-history" id="conversationHistory"></div>
        </div>

        <!-- MAIN CHAT -->
        <div class="chat-container">
            <div class="chat-header">
                <div class="chat-header-title">JARVIS AGENTIC SYSTEM</div>
                <div class="chat-header-status">
                    <span class="status-dot"></span>
                    <span>OPERATIONAL</span>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="empty-state">
                    <div class="empty-state-title">SYSTEM READY</div>
                    <p>AGENTIC AI INTERFACE - OPERATIONAL MODE</p>
                    <p style="margin-top: 20px;">INITIALIZE CONVERSATION...</p>
                </div>
            </div>

            <div class="input-area">
                <form class="input-form" onsubmit="sendMessage(event)">
                    <textarea
                        class="input-field"
                        id="messageInput"
                        placeholder="Enter command..."
                        rows="1"
                    ></textarea>
                    <button type="submit" class="send-btn" id="sendBtn">→</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let currentConversationId = null;

        document.addEventListener('DOMContentLoaded', () => {
            startNewConversation();
            setupInputHandlers();
        });

        function setupInputHandlers() {
            const input = document.getElementById('messageInput');
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage(e);
                }
            });

            input.addEventListener('input', () => {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 100) + 'px';
            });
        }

        function newChat() {
            startNewConversation();
        }

        function startNewConversation() {
            currentConversationId = `conv-${Date.now()}`;
            document.getElementById('messages').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-title">SESSION INITIALIZED</div>
                    <p>AGENTIC CORE ACTIVATED</p>
                    <p style="margin-top: 20px;">AWAITING INPUT...</p>
                </div>
            `;
            document.getElementById('messageInput').focus();
        }

        async function sendMessage(e) {
            e.preventDefault();

            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            input.value = '';
            input.style.height = 'auto';

            addMessage(message, 'user');

            const loadingId = `loading-${Date.now()}`;
            addMessage(`PROCESSING AGENTIC LOOP...`, 'jarvis', loadingId);

            try {
                const response = await fetch(`${API}/api/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: message, priority: 'medium' }),
                });

                const data = await response.json();

                if (data.success) {
                    removeMessage(loadingId);
                    await pollTaskResult(data.data.id, message);
                } else {
                    updateMessage(loadingId, `ERROR: ${data.error}`);
                }
            } catch (error) {
                updateMessage(loadingId, `ERROR: CONNECTION FAILED`);
            }
        }

        async function pollTaskResult(taskId, originalQuery, attempts = 0) {
            if (attempts > 30) {
                addMessage(`ERROR: TIMEOUT - PROCESSING EXCEEDED`, 'jarvis');
                return;
            }

            try {
                const response = await fetch(`${API}/api/tasks/${taskId}`);
                const data = await response.json();

                if (data.success && data.data) {
                    const task = data.data;

                    if (task.status === 'completed') {
                        let resultMessage = '';

                        if (task.result?.output) {
                            resultMessage += `${task.result.output}\n\n`;
                        }

                        if (task.result?.reasoning) {
                            resultMessage += `REASONING: ${task.result.reasoning}\n\n`;
                        }

                        const vizHtml = buildAgenticViz(task);
                        resultMessage += vizHtml;

                        addMessage(resultMessage, 'jarvis', null, true);
                    } else if (task.status === 'processing') {
                        await new Promise(r => setTimeout(r, 1000));
                        await pollTaskResult(taskId, originalQuery, attempts + 1);
                    } else if (task.status === 'failed') {
                        addMessage(`ERROR: ${task.error || 'UNKNOWN'}`, 'jarvis');
                    }
                }
            } catch (error) {
                await new Promise(r => setTimeout(r, 1000));
                await pollTaskResult(taskId, originalQuery, attempts + 1);
            }
        }

        function buildAgenticViz(task) {
            const result = task.result || {};
            const iterations = result.iterations || 0;
            const approved = result.constitutionalValidation?.approved ? 'APPROVED' : 'PENDING';

            return `
                <div class="agentic-viz">
                    AGENTIC LOOP EXECUTION
                    <div class="phase-bar">
                        <div class="phase completed"></div>
                        <div class="phase completed"></div>
                        <div class="phase completed"></div>
                        <div class="phase active"></div>
                    </div>
                    ${iterations} ITERATIONS COMPLETE
                    <div class="constitution-status">
                        CONSTITUTION: ${approved}
                    </div>
                </div>
            `;
        }

        function addMessage(text, sender, id = null, isHtml = false) {
            const messagesDiv = document.getElementById('messages');

            const emptyState = messagesDiv.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.id = id;

            const avatar = sender === 'jarvis' ? '◆' : '▸';
            const avatarClass = sender === 'jarvis' ? 'jarvis' : 'user';

            messageDiv.innerHTML = `
                <div class="message-avatar ${avatarClass}">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${isHtml ? text : escapeHtml(text)}</div>
                    <div class="message-time">${new Date().toLocaleTimeString()}</div>
                </div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateMessage(id, text) {
            const el = document.getElementById(id);
            if (el) {
                const bubble = el.querySelector('.message-bubble');
                if (bubble) bubble.textContent = text;
            }
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
