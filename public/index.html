<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis IA - Conversación Agentica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --success: #48bb78;
            --warning: #ecc94b;
            --danger: #f56565;
            --bg-dark: #0a0e27;
            --bg-medium: #1a1f3a;
            --bg-light: #252d48;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border: #3a3f54;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-medium) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--bg-dark);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .logo {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .conversation-history {
            flex: 1;
            overflow-y: auto;
        }

        .conversation-item {
            padding: 12px;
            margin-bottom: 8px;
            background: var(--bg-medium);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .conversation-item:hover {
            background: var(--bg-light);
            color: var(--text-primary);
            border-color: var(--primary);
        }

        .conversation-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* MAIN CHAT */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: var(--bg-light);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-title {
            font-size: 1.2em;
            font-weight: 600;
            color: var(--primary);
        }

        .chat-header-status {
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 0.9em;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* MESSAGES */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9em;
            flex-shrink: 0;
        }

        .message-avatar.jarvis {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .message-avatar.user {
            background: var(--warning);
            color: var(--bg-dark);
        }

        .message-content {
            max-width: 70%;
            flex: 1;
        }

        .message.user .message-content {
            text-align: right;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-radius: 12px 4px 12px 12px;
        }

        .message.jarvis .message-bubble {
            background: var(--bg-light);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 4px 12px 12px 12px;
        }

        .message-meta {
            font-size: 0.75em;
            color: var(--text-secondary);
            margin-top: 6px;
            padding: 0 4px;
        }

        .message.user .message-meta {
            text-align: right;
        }

        /* AGENTIC LOOP VISUALIZATION */
        .agentic-viz {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
            font-size: 0.85em;
        }

        .phase-stages {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
        }

        .phase-stage {
            flex: 1;
            height: 4px;
            background: var(--bg-medium);
            border-radius: 2px;
            overflow: hidden;
        }

        .phase-stage.active {
            background: var(--primary);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .phase-stage.completed {
            background: var(--success);
        }

        .phase-label {
            color: var(--text-secondary);
            font-weight: 600;
        }

        .iteration-info {
            color: var(--primary);
            font-weight: 600;
            margin-top: 4px;
        }

        .constitution-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 600;
            margin-top: 8px;
        }

        .constitution-badge.approved {
            background: rgba(72, 187, 120, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .constitution-badge.pending {
            background: rgba(236, 201, 75, 0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        /* INPUT AREA */
        .input-area {
            background: var(--bg-light);
            border-top: 1px solid var(--border);
            padding: 20px;
            display: flex;
            gap: 12px;
        }

        .input-form {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .input-field {
            flex: 1;
            background: var(--bg-medium);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95em;
            resize: none;
            max-height: 100px;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.2);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex-direction: column;
            color: var(--text-secondary);
            text-align: center;
        }

        .empty-state-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                width: 0;
                position: absolute;
                height: 100%;
                z-index: 100;
                transition: all 0.3s ease;
            }

            .sidebar.open {
                width: 280px;
            }

            .message-content {
                max-width: 90%;
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-medium);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="logo">🧠 Jarvis IA</div>
            <button class="new-chat-btn" onclick="newChat()">+ Nueva Conversación</button>
            <div class="conversation-history" id="conversationHistory"></div>
        </div>

        <!-- MAIN CHAT -->
        <div class="chat-container">
            <!-- HEADER -->
            <div class="chat-header">
                <div class="chat-header-title">Jarvis IA - Agente Agentico</div>
                <div class="chat-header-status">
                    <span class="status-indicator"></span>
                    <span>Sistema Operativo</span>
                </div>
            </div>

            <!-- MESSAGES -->
            <div class="messages" id="messages">
                <div class="empty-state">
                    <div class="empty-state-title">🚀 Bienvenido a Jarvis IA</div>
                    <p>Sistema de Inteligencia Artificial Completamente Agentico con Constitutional AI</p>
                    <p style="margin-top: 20px; font-size: 0.9em; color: var(--text-secondary);">
                        Comienza una conversación para activar el agentic loop real.
                    </p>
                </div>
            </div>

            <!-- INPUT -->
            <div class="input-area">
                <form class="input-form" onsubmit="sendMessage(event)">
                    <textarea
                        class="input-field"
                        id="messageInput"
                        placeholder="Cuéntale a Jarvis qué necesitas... (Shift+Enter para nueva línea)"
                        rows="1"
                    ></textarea>
                    <button type="submit" class="send-btn" id="sendBtn">📤</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let currentConversationId = null;
        let messageCount = 0;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            startNewConversation();
            setupInputHandlers();
        });

        // Setup input handlers
        function setupInputHandlers() {
            const input = document.getElementById('messageInput');
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage(e);
                }
            });

            // Auto-resize textarea
            input.addEventListener('input', () => {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 100) + 'px';
            });
        }

        // New conversation
        function newChat() {
            startNewConversation();
        }

        function startNewConversation() {
            currentConversationId = `conv-${Date.now()}`;
            messageCount = 0;
            document.getElementById('messages').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-title">🧠 Jarvis IA Listo</div>
                    <p>Conversación agentica iniciada</p>
                    <p style="margin-top: 20px; font-size: 0.9em; color: var(--text-secondary);">
                        Cuéntame qué necesitas. Usaré mi loop agentico completo para ayudarte.
                    </p>
                </div>
            `;
            document.getElementById('messageInput').focus();
        }

        // Send message
        async function sendMessage(e) {
            e.preventDefault();

            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // Clear input
            input.value = '';
            input.style.height = 'auto';

            // Add user message
            addMessage(message, 'user');

            // Show loading
            const loadingId = `loading-${Date.now()}`;
            addMessage(
                `<span class="loading-indicator"></span> Ejecutando agentic loop...`,
                'jarvis',
                loadingId
            );

            try {
                // Execute task
                const response = await fetch(`${API}/api/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: message,
                        priority: 'medium',
                    }),
                });

                const data = await response.json();

                if (data.success) {
                    // Remove loading
                    removeMessage(loadingId);

                    // Poll for result
                    await pollTaskResult(data.data.id, message);
                } else {
                    updateMessage(loadingId, `Error: ${data.error}`);
                }
            } catch (error) {
                updateMessage(loadingId, `Error de conexión: ${error.message}`);
            }
        }

        // Poll task result
        async function pollTaskResult(taskId, originalQuery, attempts = 0) {
            if (attempts > 30) {
                addMessage(
                    'Timeout ejecutando tarea. Jarvis requiere más tiempo para este análisis.',
                    'jarvis'
                );
                return;
            }

            try {
                const response = await fetch(`${API}/api/tasks/${taskId}`);
                const data = await response.json();

                if (data.success && data.data) {
                    const task = data.data;

                    if (task.status === 'completed') {
                        // Show result
                        let resultMessage = '';

                        if (task.result) {
                            resultMessage += `<strong>Resultado:</strong>\n${task.result.output}\n\n`;
                        }

                        if (task.result?.reasoning) {
                            resultMessage += `<strong>Razonamiento:</strong>\n${task.result.reasoning}\n\n`;
                        }

                        // Add agentic visualization
                        const vizHtml = buildAgenticViz(task);
                        resultMessage += vizHtml;

                        addMessage(resultMessage, 'jarvis', null, true);
                    } else if (task.status === 'processing') {
                        // Continue polling
                        await new Promise(r => setTimeout(r, 1000));
                        await pollTaskResult(taskId, originalQuery, attempts + 1);
                    } else if (task.status === 'failed') {
                        addMessage(
                            `Error ejecutando tarea: ${task.error || 'Error desconocido'}`,
                            'jarvis'
                        );
                    }
                }
            } catch (error) {
                console.error('Error polling:', error);
                await new Promise(r => setTimeout(r, 1000));
                await pollTaskResult(taskId, originalQuery, attempts + 1);
            }
        }

        // Build agentic visualization
        function buildAgenticViz(task) {
            const result = task.result || {};
            const iterations = result.iterations || 0;
            const approved = result.constitutionalValidation?.approved ? 'approved' : 'pending';

            return `
                <div class="agentic-viz">
                    <div class="phase-label">⚡ Agentic Loop Execution</div>
                    <div class="phase-stages">
                        <div class="phase-stage completed"></div>
                        <div class="phase-stage completed"></div>
                        <div class="phase-stage completed"></div>
                        <div class="phase-stage completed"></div>
                    </div>
                    <div class="iteration-info">✓ ${iterations} iteraciones completadas</div>
                    <div class="constitution-badge ${approved}">
                        ${approved === 'approved' ? '✅ Constitutional AI Aprobado' : '⏳ Validando Constitución'}
                    </div>
                </div>
            `;
        }

        // Add message to chat
        function addMessage(text, sender, id = null, isHtml = false) {
            const messagesDiv = document.getElementById('messages');

            // Remove empty state if exists
            const emptyState = messagesDiv.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.id = id;

            const avatar = sender === 'jarvis' ? '🧠' : '👤';
            const avatarClass = sender === 'jarvis' ? 'jarvis' : 'user';

            messageDiv.innerHTML = `
                <div class="message-avatar ${avatarClass}">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${isHtml ? text : escapeHtml(text)}</div>
                    <div class="message-meta">${new Date().toLocaleTimeString()}</div>
                </div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Update message
        function updateMessage(id, text) {
            const el = document.getElementById(id);
            if (el) {
                const bubble = el.querySelector('.message-bubble');
                if (bubble) {
                    bubble.textContent = text;
                }
            }
        }

        // Remove message
        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) {
                el.remove();
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
