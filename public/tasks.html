<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS - Gestor de Tareas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f1624 0%, #1a1f3a 100%);
      color: #e2e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 2rem;
    }
    .navbar {
      background: rgba(15, 22, 40, 0.95);
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
      padding: 1rem 2rem;
      display: flex;
      gap: 2rem;
      backdrop-filter: blur(10px);
      margin: -2rem -2rem 2rem -2rem;
    }
    .navbar a {
      color: #94a3b8;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      transition: all 0.3s;
    }
    .navbar a:hover {
      color: #00d4ff;
      background: rgba(0, 212, 255, 0.1);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { color: #00d4ff; margin-bottom: 2rem; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 2rem;
    }
    .section {
      background: rgba(30, 40, 60, 0.8);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 12px;
      padding: 2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #94a3b8;
    }
    input, textarea, select {
      width: 100%;
      padding: 0.75rem;
      background: rgba(15, 22, 40, 0.8);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 6px;
      color: #e2e8f0;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: rgba(0, 212, 255, 0.6);
    }
    .btn {
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
    }
    .task-item {
      background: rgba(15, 22, 40, 0.6);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .task-item:hover {
      border-color: rgba(0, 212, 255, 0.5);
      background: rgba(15, 22, 40, 1);
    }
    .task-title {
      color: #00d4ff;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .task-desc {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }
    .task-status {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .status-pending {
      background: rgba(139, 92, 246, 0.2);
      color: #8b5cf6;
    }
    .status-running {
      background: rgba(249, 115, 22, 0.2);
      color: #f59e0b;
    }
    .status-completed {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="/">← Volver</a>
    <a href="/chat.html">💬 Chat</a>
    <a href="/dashboard.html">📊 Dashboard</a>
    <a href="/automation.html">⚙️ Automatización</a>
  </div>

  <div class="container">
    <h1>✅ Gestor de Tareas Automáticas</h1>

    <div class="grid">
      <div class="section">
        <h2 style="color: #8b5cf6; margin-bottom: 1.5rem;">Crear Nueva Tarea</h2>

        <div class="form-group">
          <label>Nombre de la tarea:</label>
          <input type="text" id="taskName" placeholder="Ej: Análisis de vulnerabilidades">
        </div>

        <div class="form-group">
          <label>Descripción:</label>
          <textarea id="taskDesc" placeholder="Qué debe hacer esta tarea..."></textarea>
        </div>

        <div class="form-group">
          <label>URL objetivo (opcional):</label>
          <input type="url" id="taskUrl" placeholder="https://example.com">
        </div>

        <div class="form-group">
          <label>Tipo de tarea:</label>
          <select id="taskType">
            <option value="scraping">Scraping Web</option>
            <option value="analysis">Análisis de Código</option>
            <option value="automation">Automatización</option>
            <option value="vulnerability_scan">Escaneo de Vulnerabilidades</option>
            <option value="custom">Personalizado</option>
          </select>
        </div>

        <div class="form-group">
          <label>Ejecutar automáticamente:</label>
          <select id="autoExecute">
            <option value="immediate">Inmediatamente</option>
            <option value="scheduled">Programado</option>
            <option value="manual">Manual</option>
          </select>
        </div>

        <button class="btn" onclick="createTask()" style="width: 100%;">➕ Crear Tarea</button>
      </div>

      <div class="section">
        <h2 style="color: #8b5cf6; margin-bottom: 1.5rem;">Tareas</h2>
        <div id="tasksList"></div>
      </div>
    </div>
  </div>

  <script>
    let tasks = [];

    async function createTask() {
      const name = document.getElementById('taskName').value;
      const desc = document.getElementById('taskDesc').value;
      const url = document.getElementById('taskUrl').value;
      const type = document.getElementById('taskType').value;
      const autoExecute = document.getElementById('autoExecute').value;

      if (!name || !desc) {
        alert('Completa nombre y descripción');
        return;
      }

      const task = {
        id: Date.now().toString(),
        name,
        desc,
        url,
        type,
        autoExecute,
        status: autoExecute === 'immediate' ? 'running' : 'pending',
        createdAt: new Date().toLocaleString('es-MX')
      };

      tasks.unshift(task);
      renderTasks();

      // Limpiar formulario
      document.getElementById('taskName').value = '';
      document.getElementById('taskDesc').value = '';
      document.getElementById('taskUrl').value = '';

      // Si es inmediato, ejecutar
      if (autoExecute === 'immediate') {
        executeTask(task.id);
      }

      alert('✓ Tarea creada: ' + name);
    }

    async function executeTask(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;

      task.status = 'running';
      renderTasks();

      try {
        const response = await fetch('/api/tasks/execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            taskId,
            name: task.name,
            type: task.type,
            url: task.url,
            description: task.desc
          })
        });

        const data = await response.json();
        task.status = 'completed';
        task.result = data.result;
        renderTasks();
      } catch (e) {
        task.status = 'pending';
        task.error = e.message;
        renderTasks();
      }
    }

    function renderTasks() {
      const list = document.getElementById('tasksList');
      if (tasks.length === 0) {
        list.innerHTML = '<div style="color: #94a3b8; text-align: center; padding: 2rem;">No hay tareas. Crea una nueva.</div>';
        return;
      }

      list.innerHTML = tasks.map(task => `
        <div class="task-item" onclick="executeTask('${task.id}')">
          <div class="task-title">${task.name}</div>
          <div class="task-desc">${task.desc}</div>
          <div style="font-size: 0.85rem; color: #64748b; margin-bottom: 0.75rem;">
            ${task.url ? '🔗 ' + task.url : ''}
            ${task.url ? '<br>' : ''}
            📅 ${task.createdAt}
          </div>
          <span class="task-status status-${task.status}">
            ${task.status === 'running' ? '⏳ Ejecutando' : task.status === 'completed' ? '✓ Completada' : '⏹ Pendiente'}
          </span>
        </div>
      `).join('');
    }

    // Cargar tareas del localStorage
    function loadTasks() {
      const saved = localStorage.getItem('jarvis-tasks');
      if (saved) {
        tasks = JSON.parse(saved);
        renderTasks();
      }
    }

    // Guardar tareas
    function saveTasks() {
      localStorage.setItem('jarvis-tasks', JSON.stringify(tasks));
    }

    // Auto-guardar cuando cambia tasks
    setInterval(saveTasks, 1000);

    // Cargar al iniciar
    loadTasks();
  </script>
</body>
</html>
