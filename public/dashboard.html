<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Dashboard - Casos & Reportes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg0: #070b1a;
            --bg1: #0b1020;
            --bg2: #0f1628;
            --bg3: #141c33;
            --cyan: #00d4ff;
            --green: #10b981;
            --orange: #f59e0b;
            --red: #ef4444;
            --purple: #8b5cf6;
            --border: rgba(0,212,255,0.12);
            --text1: #e2e8f0;
            --text2: #94a3b8;
            --text3: #475569;
        }

        html, body { height: 100%; background: var(--bg0); color: var(--text1); font-family: 'Inter', sans-serif; overflow: hidden; }

        .container { display: flex; flex-direction: column; height: 100vh; }

        /* TOPBAR */
        .topbar {
            background: linear-gradient(90deg, var(--bg1) 0%, rgba(139,92,246,0.05) 100%);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-title { font-family: 'Roboto Mono'; font-size: 14px; color: var(--purple); font-weight: 700; letter-spacing: 1px; }
        .topbar-stats { display: flex; gap: 20px; font-size: 11px; color: var(--text2); }

        /* MAIN GRID */
        .main-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; overflow: hidden; }

        /* CARD CONTAINER */
        .card-container { display: flex; flex-direction: column; background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .card-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .card-title { font-size: 12px; font-family: 'Roboto Mono'; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; }
        .card-actions { display: flex; gap: 8px; }
        .card-btn {
            background: transparent; border: 1px solid var(--border); color: var(--cyan);
            border-radius: 4px; padding: 4px 8px; font-size: 10px; font-family: 'Roboto Mono';
            cursor: pointer; transition: all .2s;
        }
        .card-btn:hover { background: rgba(0,212,255,.08); border-color: var(--cyan); }

        .card-content { flex: 1; overflow-y: auto; padding: 16px; }

        /* CASE LIST */
        .case-item {
            background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 12px;
            margin-bottom: 10px; cursor: pointer; transition: all .2s;
        }
        .case-item:hover { border-color: rgba(0,212,255,.3); box-shadow: 0 0 12px rgba(0,212,255,.1); }

        .case-type { font-size: 11px; font-family: 'Roboto Mono'; color: var(--orange); font-weight: 600; }
        .case-target { font-size: 12px; color: var(--text1); margin-top: 2px; }
        .case-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 9px; color: var(--text3); }
        .badge {
            padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: 600;
        }
        .badge-critical { background: rgba(239,68,68,.2); color: #ef4444; }
        .badge-high { background: rgba(245,158,11,.2); color: #f59e0b; }
        .badge-medium { background: rgba(245,158,11,.2); color: #f59e0b; }
        .badge-low { background: rgba(16,185,129,.2); color: #10b981; }

        /* STATS GRID */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card {
            background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; text-align: center;
        }
        .stat-num { font-size: 20px; font-family: 'Roboto Mono'; font-weight: 700; color: var(--cyan); }
        .stat-label { font-size: 9px; color: var(--text3); margin-top: 4px; text-transform: uppercase; }

        /* BUTTONS */
        .btn {
            background: var(--purple); color: white; border: none; border-radius: 6px;
            padding: 10px 16px; font-family: 'Roboto Mono'; font-size: 11px; font-weight: 600;
            cursor: pointer; transition: all .2s;
        }
        .btn:hover:not(:disabled) { background: var(--purple); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139,92,246,.4); }
        .btn:disabled { opacity: .5; cursor: not-allowed; }

        .btn-secondary {
            background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
        }
        .btn-secondary:hover { background: rgba(0,212,255,.08); }

        .btn-success {
            background: var(--green);
        }
        .btn-success:hover { background: var(--green); }

        .btn-danger {
            background: var(--red);
        }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto;
            padding: 24px;
        }
        .modal-header { font-size: 16px; color: var(--cyan); font-weight: 700; margin-bottom: 16px; }
        .modal-close {
            position: absolute; top: 16px; right: 16px; background: transparent; border: none;
            color: var(--text2); cursor: pointer; font-size: 20px;
        }
        .modal-form { display: flex; flex-direction: column; gap: 12px; }
        .form-group { display: flex; flex-direction: column; }
        .form-label { font-size: 11px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
        .form-input, .form-textarea, .form-select {
            background: var(--bg2); border: 1px solid var(--border); color: var(--text1);
            border-radius: 4px; padding: 10px; font-family: 'Inter'; font-size: 12px; outline: none;
        }
        .form-textarea { min-height: 120px; resize: none; }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,212,255,.2);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg0); }
        ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

        /* LOADING */
        .loading { text-align: center; color: var(--text3); font-style: italic; }

        @media (max-width: 1200px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- TOPBAR -->
    <header class="topbar">
        <div class="topbar-title">◆ JARVIS DASHBOARD</div>
        <div class="topbar-stats">
            <div>Total: <strong id="stat-total">0</strong> casos</div>
            <div>|</div>
            <div>Críticas: <strong id="stat-critical" style="color: #ef4444;">0</strong></div>
            <div>|</div>
            <div>Bounty: <strong id="stat-bounty" style="color: var(--green);">$0</strong></div>
            <div style="margin-left: auto;">
                <a href="/chat.html" style="color: var(--cyan); text-decoration: none; font-family: 'Roboto Mono'; font-size: 11px;">← Chat</a>
            </div>
        </div>
    </header>

    <!-- MAIN GRID -->
    <div class="main-grid">

        <!-- LEFT: Cases List -->
        <div class="card-container">
            <div class="card-header">
                <div class="card-title">📋 Vulnerabilidades Encontradas</div>
                <div class="card-actions">
                    <button class="card-btn" onclick="loadCases()">↻</button>
                    <button class="card-btn" onclick="openNewCaseModal()">+</button>
                </div>
            </div>
            <div class="card-content" id="cases-list">
                <div class="loading">Cargando casos...</div>
            </div>
        </div>

        <!-- RIGHT: Case Details & Stats -->
        <div class="card-container">
            <div class="card-header">
                <div class="card-title">📊 Detalles & Estadísticas</div>
            </div>
            <div class="card-content" id="case-details">
                <div class="loading">Selecciona un caso para ver detalles</div>
            </div>
        </div>

    </div>

</div>

<!-- MODAL: New Case -->
<div id="new-case-modal" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeNewCaseModal()">✕</button>
        <div class="modal-header">Crear Nuevo Caso</div>
        <div class="modal-form">
            <div class="form-group">
                <label class="form-label">Target</label>
                <input class="form-input" id="form-target" placeholder="ejemplo.com">
            </div>
            <div class="form-group">
                <label class="form-label">Tipo de Vulnerabilidad</label>
                <select class="form-select" id="form-type">
                    <option>SQL Injection</option>
                    <option>XSS</option>
                    <option>Auth Bypass</option>
                    <option>Path Traversal</option>
                    <option>CSRF</option>
                    <option>RCE</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Ubicación</label>
                <input class="form-input" id="form-location" placeholder="/api/endpoint">
            </div>
            <div class="form-group">
                <label class="form-label">Parámetro</label>
                <input class="form-input" id="form-parameter" placeholder="id, email, etc">
            </div>
            <div class="form-group">
                <label class="form-label">Severidad</label>
                <select class="form-select" id="form-severity">
                    <option>Crítica</option>
                    <option>Alta</option>
                    <option>Media</option>
                    <option>Baja</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">CVSS Score</label>
                <input class="form-input" id="form-cvss" type="number" min="0" max="10" step="0.1" placeholder="7.5">
            </div>
            <div class="form-group">
                <label class="form-label">Bounty Estimado ($)</label>
                <input class="form-input" id="form-bounty" type="number" min="0" placeholder="2500">
            </div>
            <div class="form-group">
                <label class="form-label">Payload</label>
                <textarea class="form-textarea" id="form-payload" placeholder="1' OR '1'='1"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Impacto</label>
                <textarea class="form-textarea" id="form-impact" placeholder="Acceso a base de datos..."></textarea>
            </div>
            <button class="btn" onclick="submitNewCase()">Crear Caso</button>
        </div>
    </div>
</div>

<!-- MODAL: Export to HackerOne -->
<div id="export-ho-modal" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeExportModal()">✕</button>
        <div class="modal-header">Exportar a HackerOne</div>
        <div class="modal-form">
            <div class="form-group">
                <label class="form-label">Programa HackerOne</label>
                <input class="form-input" id="export-program" placeholder="nombre-del-programa">
            </div>
            <div style="background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 12px; font-size: 11px; color: var(--text2); margin: 12px 0;">
                ⚠️ Asegúrate de que el programa esté en el scope de HackerOne
            </div>
            <button class="btn btn-success" onclick="submitToHackerOne()">Exportar y Enviar</button>
        </div>
    </div>
</div>

<script>
let cases = [];
let selectedCaseId = null;

// Load cases on startup
loadCases();

async function loadCases() {
    const container = document.getElementById('cases-list');
    container.innerHTML = '<div class="loading">Cargando...</div>';

    try {
        const res = await fetch('/api/cases');
        const data = await res.json();

        if (!data.success || !data.data.cases) {
            container.innerHTML = '<div class="loading">Sin casos aún</div>';
            return;
        }

        cases = data.data.cases;
        const stats = data.data.statistics;

        // Update topbar stats
        document.getElementById('stat-total').textContent = stats.total;
        document.getElementById('stat-critical').textContent = stats.bySeverity.critica;
        document.getElementById('stat-bounty').textContent = '$' + stats.totalBounty.toLocaleString();

        if (cases.length === 0) {
            container.innerHTML = '<div class="loading">Sin casos encontrados</div>';
            return;
        }

        // Display cases
        container.innerHTML = cases.map(c => `
            <div class="case-item" onclick="selectCase('${c.id}')">
                <div class="case-type">${c.type}</div>
                <div class="case-target">${c.target}</div>
                <div class="case-meta">
                    <span class="badge badge-${c.severity.toLowerCase()}">${c.severity}</span>
                    <span>CVSS ${c.cvss}</span>
                    <span>$${c.bountyEstimate}</span>
                    <span>${new Date(c.timestamp).toLocaleDateString('es-MX')}</span>
                </div>
            </div>
        `).join('');

    } catch (error) {
        container.innerHTML = `<div class="loading">Error: ${error.message}</div>`;
    }
}

function selectCase(caseId) {
    selectedCaseId = caseId;
    const caseData = cases.find(c => c.id === caseId);
    if (!caseData) return;

    const details = document.getElementById('case-details');
    details.innerHTML = `
        <div style="display: flex; flex-direction: column; gap: 16px;">
            <div>
                <div style="font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px;">Tipo</div>
                <div style="font-size: 14px; color: var(--cyan); font-weight: 700;">${caseData.type}</div>
            </div>

            <div>
                <div style="font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px;">Target</div>
                <div style="font-size: 12px; color: var(--text1); font-family: 'Roboto Mono';">${caseData.target}</div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <div style="font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px;">Severidad</div>
                    <div style="font-size: 12px; color: var(--text1); font-weight: 600;">${caseData.severity}</div>
                </div>
                <div>
                    <div style="font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px;">CVSS</div>
                    <div style="font-size: 12px; color: var(--text1); font-weight: 600;">${caseData.cvss.toFixed(1)}/10</div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <div style="font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px;">Ubicación</div>
                    <div style="font-size: 11px; color: var(--text2); font-family: 'Roboto Mono';">${caseData.location}</div>
                </div>
                <div>
                    <div style="font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px;">Parámetro</div>
                    <div style="font-size: 11px; color: var(--text2); font-family: 'Roboto Mono';">${caseData.parameter || 'N/A'}</div>
                </div>
            </div>

            <div>
                <div style="font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px;">Bounty Estimado</div>
                <div style="font-size: 16px; color: var(--green); font-weight: 700; font-family: 'Roboto Mono';">$${caseData.bountyEstimate.toLocaleString()}</div>
            </div>

            <div>
                <div style="font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px;">Payload</div>
                <div style="background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 10px; font-family: 'Roboto Mono'; font-size: 10px; color: var(--green); overflow-x: auto;">
                    ${(caseData.payload || 'N/A').substring(0, 200)}...
                </div>
            </div>

            <div>
                <div style="font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px;">Impacto</div>
                <div style="background: var(--bg2); border-left: 3px solid var(--red); border-radius: 0 4px 4px 0; padding: 10px; font-size: 11px; color: var(--text2);">
                    ${caseData.impact}
                </div>
            </div>

            <div style="display: flex; gap: 8px; margin-top: 12px;">
                <button class="btn btn-secondary" onclick="openReportModal('${caseId}')">📄 Reporte</button>
                <button class="btn btn-secondary" onclick="openExportModal('${caseId}')">📤 H1</button>
            </div>
        </div>
    `;
}

function openNewCaseModal() {
    document.getElementById('new-case-modal').classList.add('active');
}

function closeNewCaseModal() {
    document.getElementById('new-case-modal').classList.remove('active');
}

async function submitNewCase() {
    const caseData = {
        target: document.getElementById('form-target').value,
        type: document.getElementById('form-type').value,
        location: document.getElementById('form-location').value,
        parameter: document.getElementById('form-parameter').value,
        severity: document.getElementById('form-severity').value,
        cvss: parseFloat(document.getElementById('form-cvss').value),
        bountyEstimate: parseInt(document.getElementById('form-bounty').value),
        payload: document.getElementById('form-payload').value,
        impact: document.getElementById('form-impact').value
    };

    try {
        const res = await fetch('/api/cases', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(caseData)
        });

        const data = await res.json();
        if (data.success) {
            closeNewCaseModal();
            loadCases();
            alert('Caso creado exitosamente');
        }
    } catch (error) {
        alert('Error: ' + error.message);
    }
}

function openReportModal(caseId) {
    window.open(`/api/cases/${caseId}/report`, '_blank');
}

function openExportModal(caseId) {
    document.getElementById('export-ho-modal').classList.add('active');
}

function closeExportModal() {
    document.getElementById('export-ho-modal').classList.remove('active');
}

async function submitToHackerOne() {
    const program = document.getElementById('export-program').value;
    if (!program) {
        alert('Ingresa el nombre del programa HackerOne');
        return;
    }

    try {
        const res = await fetch(`/api/cases/${selectedCaseId}/export-ho`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ programHandle: program })
        });

        const data = await res.json();
        if (data.success) {
            closeExportModal();
            alert(`✓ Caso exportado a HackerOne (ID: ${data.reportId})`);
            loadCases();
        } else {
            alert('Error: ' + (data.error || 'Unknown error'));
        }
    } catch (error) {
        alert('Error: ' + error.message);
    }
}
</script>

</body>
</html>
